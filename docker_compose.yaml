version: "3.8"

services:
  zfs_exporter:
    image: ghcr.io/urkaz/zfs_exporter:latest
    container_name: zfs_exporter
    ports:
      - "9134:9134"
    restart: unless-stopped
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/zfs
    privileged: true
    environment:
      - TZ=Etc/UTC
